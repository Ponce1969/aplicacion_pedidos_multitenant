# docker-compose.prod.yml — Producción con Cloudflare Tunnel
# USO: docker compose -f docker-compose.prod.yml up -d
# Cloudflare Tunnel maneja HTTPS, no necesita certificados locales
# Tunnel apunta a: http://orange-pi-ip:${NGINX_PORT:-8010}
#
# ⚠️ OBLIGATORIO: Crear .env con los valores reales antes de levantar.
#    cp .env.example .env && editar con valores de produccion.
#    SIN .env, los contenedores FALLARAN (no hay defaults para secrets).

services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER no definido en .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido en .env}
      POSTGRES_DB: ${POSTGRES_DB:-barraca}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Solo localhost: la DB no debe quedar expuesta en la red, solo la usa la app
      # internamente via la barraca_network. Conectate con 127.0.0.1 desde el host.
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?} -d ${POSTGRES_DB:-barraca}"]
      interval: ${HEALTHCHECK_INTERVAL:-10s}
      timeout: ${HEALTHCHECK_TIMEOUT:-5s}
      retries: ${HEALTHCHECK_RETRIES:-5}
    networks:
      - barraca_network
    restart: unless-stopped

  app:
    build: .
    expose:
      - "${APP_INTERNAL_PORT:-8000}"
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:-barraca}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-20}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-10}

      # Core settings
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY no definido en .env}
      BASE_URL: ${BASE_URL:?BASE_URL no definido en .env}

      # Security
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}

      # External services
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${APP_INTERNAL_PORT:-8000}/health')\" || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-15s}
    networks:
      - barraca_network
    restart: unless-stopped

  nginx:
    image: ${NGINX_IMAGE:-nginx:alpine}
    ports:
      # Solo localhost: el Cloudflare Tunnel corre en esta misma maquina.
      # Evita que otros hosts de la LAN golpeen nginx directo.
      - "127.0.0.1:${NGINX_PORT:-8010}:80"
    volumes:
      - ${NGINX_CONFIG:-./nginx.conf}:/etc/nginx/nginx.conf:ro
      - ./app/static:/app/static:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - barraca_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  barraca_network:
    driver: bridge