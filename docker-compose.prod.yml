# docker-compose.prod.yml — Producción con Cloudflare Tunnel
# USO: docker compose -f docker-compose.prod.yml up -d
# Cloudflare Tunnel maneja HTTPS, no necesita certificados locales
# Tunnel apunta a: http://orange-pi-ip:8010
#
# ⚠️ OBLIGATORIO: Crear .env con los valores reales antes de levantar.
#    cp .env.example .env && editar con valores de produccion.
#    SIN .env, los contenedores FALLARAN (no hay defaults para secrets).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER no definido en .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido en .env}
      POSTGRES_DB: ${POSTGRES_DB:-barraca}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5445:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?} -d ${POSTGRES_DB:-barraca}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - barraca_network
    restart: unless-stopped

  app:
    build: .
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:-barraca}
      APP_ENV: production
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY no definido en .env}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-20}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-10}
      BASE_URL: https://pedidos-generales.loquinto.com
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - barraca_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8010:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - barraca_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  barraca_network:
    driver: bridge