events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # No exponer la version de nginx en headers ni paginas de error
    server_tokens off;

    # Rate limit para endpoints de autenticacion (anti brute-force por IP)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # Upstream FastAPI — HTTP/1.1 con keepalive para conexiones async
    upstream fastapi {
        server app:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name pedidos-generales.loquinto.com;

        client_max_body_size 20M;

        # Headers de seguridad. La conexion cliente<->Cloudflare es HTTPS;
        # Cloudflare Tunnel termina TLS y nginx recibe HTTP en la LAN.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        # htmx (unpkg) y Tailwind (cdn.tailwindcss.com) se cargan desde CDN;
        # se permiten esos origenes para no romper la app. Idealmente
        # self-hostealas y endurecer script-src a 'self'.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data: https:; font-src 'self' https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # Timeouts razonables para evitar workers colgados
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Login y registro: limitar intentos por IP (burst permite ráfagas cortas)
        location = /api/login {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
        }

        location = /api/registro {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
        }

        location / {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Connection "";          # keepalive

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            # Cloudflare Tunnel termina TLS externamente; nginx recibe siempre HTTP.
            # Forzamos https para que FastAPI sepa que el cliente original usó HTTPS.
            proxy_set_header X-Forwarded-Proto https;

            proxy_buffering off;
        }

        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }

        location /health {
            proxy_pass http://fastapi/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }
    }
}
