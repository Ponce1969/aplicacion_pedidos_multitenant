# nginx.conf — Reverse proxy con HTTPS para producción
# USO: Montar este archivo en /etc/nginx/nginx.conf dentro del contenedor nginx
# REQUIERE: Certificados SSL en ./certs/fullchain.pem y ./certs/privkey.pem

events {
    worker_connections 1024;
}

http {
    # Redirect HTTP a HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers (refuerza los del middleware de FastAPI)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 10m;

        # Proxy a la app FastAPI
        location / {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Archivos estáticos con caché
        location /static/ {
            proxy_pass http://app:8000;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}