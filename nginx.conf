events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Upstream FastAPI — HTTP/1.1 con keepalive para conexiones async
    upstream fastapi {
        server app:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name pedidos-generales.loquinto.com;

        client_max_body_size 20M;

        # Timeouts razonables para evitar workers colgados
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        location / {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Connection "";          # keepalive

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            # Cloudflare Tunnel termina TLS externamente; nginx recibe siempre HTTP.
            # Forzamos https para que FastAPI sepa que el cliente original usó HTTPS.
            proxy_set_header X-Forwarded-Proto https;

            proxy_buffering off;
        }

        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }

        location /health {
            proxy_pass http://fastapi/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }
    }
}