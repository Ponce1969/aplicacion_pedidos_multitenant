{% if productos %}
<ul class="absolute z-50 w-full bg-white border border-gray-300 rounded-md shadow-lg max-h-40 overflow-y-auto">
    {% for p in productos %}
    <li class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm"
        onclick="agregarProducto({{ p.id }}, '{{ p.nombre }}', {{ p.precio_base }})">
        {{ p.nombre }} — $ {{ "{:,.0f}".format(p.precio_base) }}
    </li>
    {% endfor %}
</ul>
{% endif %}
