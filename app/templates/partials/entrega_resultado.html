{% if tipo == "success" %}
<div class="bg-green-50 border border-green-300 text-green-700 px-4 py-6 rounded-xl text-center">
    <div class="text-3xl mb-2">✅</div>
    <p class="font-semibold">{{ mensaje }}</p>
</div>
{% elif tipo == "warning" %}
<div class="bg-yellow-50 border border-yellow-300 text-yellow-700 px-4 py-6 rounded-xl text-center">
    <div class="text-3xl mb-2">📋</div>
    <p class="font-semibold">{{ mensaje }}</p>
</div>
{% else %}
<div class="bg-blue-50 border border-blue-300 text-blue-700 px-4 py-6 rounded-xl text-center">
    <p class="font-semibold">{{ mensaje }}</p>
</div>
{% endif %}
