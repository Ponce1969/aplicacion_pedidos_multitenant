{% if clientes %}
<ul class="absolute z-50 w-full bg-white border border-gray-300 rounded-md shadow-lg max-h-40 overflow-y-auto">
    {% for c in clientes %}
    <li class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm"
        data-id="{{ c.id }}"
        data-nombre="{{ c.nombre }}"
        data-apellido="{{ c.apellido }}"
        data-celular="{{ c.celular }}"
        data-direccion="{{ c.direccion|default('', true) }}"
        onclick="seleccionarCliente(this.dataset.id, this.dataset.nombre, this.dataset.apellido, this.dataset.celular, this.dataset.direccion)">
        {{ c.nombre }} {{ c.apellido }} — 📱 {{ c.celular }}
    </li>
    {% endfor %}
</ul>
{% endif %}
