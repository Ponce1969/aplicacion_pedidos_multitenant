{% if clientes %}
<ul class="absolute z-50 w-full bg-white border border-gray-300 rounded-md shadow-lg max-h-40 overflow-y-auto">
    {% for c in clientes %}
    <li class="px-3 py-2 hover:bg-blue-50 cursor-pointer text-sm flex items-center justify-between group"
        data-id="{{ c.id }}"
        data-nombre="{{ c.nombre }}"
        data-apellido="{{ c.apellido }}"
        data-celular="{{ c.celular }}"
        data-direccion="{{ c.direccion|default('', true) }}"
        data-ci="{{ c.ci|default('', true) }}"
        onclick="seleccionarCliente(this.dataset.id, this.dataset.nombre, this.dataset.apellido, this.dataset.celular, this.dataset.direccion, this.dataset.ci)">
        <span>{{ c.nombre }} {{ c.apellido }}{% if c.ci %} — 🪪 {{ c.ci }}{% endif %} — 📱 {{ c.celular }}</span>
        <button 
            type="button"
            hx-get="/api/clientes/{{ c.id }}/insights?type=consolidado&dias=30"
            hx-target="#cliente-insights-panel"
            hx-swap="innerHTML"
            onclick="event.stopPropagation(); document.getElementById('cliente-insights-panel').scrollIntoView({behavior: 'smooth'});"
            class="ml-2 px-2 py-1 text-xs bg-gray-100 hover:bg-blue-100 text-gray-600 hover:text-blue-700 rounded transition-colors opacity-0 group-hover:opacity-100"
            title="Ver insights del cliente">
            📊
        </button>
    </li>
    {% endfor %}
</ul>
{% elif query %}
<!-- DEBUG: sin resultados para '{{ query }}' -->
<div class="text-sm text-gray-500 px-3 py-2 bg-yellow-50 border border-yellow-200 rounded">Sin resultados para "{{ query }}"</div>
{% endif %}
