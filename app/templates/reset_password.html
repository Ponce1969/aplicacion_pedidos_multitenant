{% extends "base.html" %}

{% block title %}Nueva Contraseña{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">🔐 Nueva Contraseña</h2>
        <p class="text-gray-600 text-sm mb-6">Ingresá tu nueva contraseña.</p>

        {% if not token %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">
            Link inválido o expirado. Solicitá uno nuevo <a href="/forgot-password" class="underline font-bold">aquí</a>.
        </div>
        {% else %}
        <form hx-post="/api/reset-password" hx-target="#resultado" hx-swap="innerHTML"
              class="space-y-4">
            <input type="hidden" name="token" value="{{ token }}">
            <div>
                <label for="new_password" class="block text-sm font-medium text-gray-700">Nueva Contraseña</label>
                <input id="new_password" name="new_password" type="password" required minlength="6"
                       placeholder="Mínimo 6 caracteres"
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirmar Contraseña</label>
                <input id="confirm_password" name="confirm_password" type="password" required minlength="6"
                       placeholder="Repetí la contraseña"
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit"
                    class="w-full py-2 px-4 bg-green-600 hover:bg-green-700 text-white font-bold rounded-md">
                Guardar Nueva Contraseña
            </button>
        </form>
        {% endif %}

        <div id="resultado" class="mt-4"></div>

        <div class="mt-4 text-center">
            <a href="/login" class="text-sm text-blue-600 hover:underline">← Volver al login</a>
        </div>
    </div>
</div>
{% endblock %}
