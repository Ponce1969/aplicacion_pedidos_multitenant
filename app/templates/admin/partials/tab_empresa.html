{% if success %}
<div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
    ✅ Configuración guardada correctamente
</div>
{% endif %}

{% if error %}
<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
    ❌ {{ error }}
</div>
{% endif %}

<form method="POST" action="/admin/configuracion/actualizar" class="bg-white shadow-md rounded-lg p-6 space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Nombre -->
        <div>
            <label class="block text-gray-700 font-medium mb-1" for="nombre">Nombre de la empresa *</label>
            <input type="text" id="nombre" name="nombre" value="{{ config.nombre or '' }}" required
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- RUT -->
        <div>
            <label class="block text-gray-700 font-medium mb-1" for="rut">RUT</label>
            <input type="text" id="rut" name="rut" value="{{ config.rut or '' }}"
                   placeholder="21.123.456-7"
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <p class="text-gray-500 text-xs mt-1">Formato uruguayo. Se normaliza automáticamente.</p>
        </div>

        <!-- Dirección -->
        <div>
            <label class="block text-gray-700 font-medium mb-1" for="direccion">Dirección</label>
            <input type="text" id="direccion" name="direccion" value="{{ config.direccion or '' }}"
                   placeholder="Av. Artigas 1234"
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Ciudad -->
        <div>
            <label class="block text-gray-700 font-medium mb-1" for="ciudad">Ciudad</label>
            <input type="text" id="ciudad" name="ciudad" value="{{ config.ciudad or '' }}"
                   placeholder="Montevideo"
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Rubro -->
        <div>
            <label class="block text-gray-700 font-medium mb-1" for="rubro">Rubro</label>
            <input type="text" id="rubro" name="rubro" value="{{ config.rubro or '' }}"
                   placeholder="Construcción, Maderera, Ferretería"
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Email -->
        <div>
            <label class="block text-gray-700 font-medium mb-1" for="email_contacto">Email</label>
            <input type="email" id="email_contacto" name="email_contacto" value="{{ config.email_contacto or '' }}"
                   placeholder="contacto@miempresa.com"
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Teléfono -->
        <div>
            <label class="block text-gray-700 font-medium mb-1" for="telefono_contacto">Teléfono</label>
            <input type="tel" id="telefono_contacto" name="telefono_contacto" value="{{ config.telefono_contacto or '' }}"
                   placeholder="099 123 456"
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <!-- Logo URL -->
        <div>
            <label class="block text-gray-700 font-medium mb-1" for="logo_url">URL del Logo</label>
            <input type="url" id="logo_url" name="logo_url" value="{{ config.logo_url or '' }}"
                   placeholder="https://ejemplo.com/logo.png"
                   class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
    </div>

    <!-- Color -->
    <div>
        <label class="block text-gray-700 font-medium mb-1">Color primario</label>
        <div class="flex gap-3 items-center">
            <input type="color" id="color_primario" name="color_primario"
                   value="{{ config.color_primario or '#3b82f6' }}"
                   class="w-12 h-10 border border-gray-300 rounded cursor-pointer">
            <input type="text" id="color_hex" value="{{ config.color_primario or '#3b82f6' }}"
                   maxlength="7" placeholder="#3b82f6"
                   class="border border-gray-300 rounded px-3 py-2 font-mono w-28"
                   oninput="document.getElementById('color_primario').value = this.value">
        </div>
    </div>

    <!-- Logo preview -->
    {% if config.logo_url %}
    <div>
        <p class="text-gray-600 text-sm mb-1">Vista previa del logo:</p>
        <div class="bg-gray-100 rounded p-4 inline-block">
            <img src="{{ config.logo_url }}" alt="Logo" class="h-12 object-contain" onerror="this.style.display='none'">
        </div>
    </div>
    {% endif %}

    <div class="pt-4">
        <button type="submit"
                class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 font-medium transition-colors">
            💾 Guardar cambios
        </button>
    </div>
</form>
