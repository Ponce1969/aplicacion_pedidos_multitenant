<div class="bg-white shadow-md rounded-lg p-6 mb-6">
    <h3 class="text-lg font-semibold text-gray-800 mb-4">
        {% if producto %}✏️ Editar Producto{% else %}➕ Nuevo Producto{% endif %}
    </h3>

    {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">{{ error }}</div>
    {% endif %}

    <form {% if producto %}
          hx-post="/admin/productos/{{ producto.id }}/editar"
          {% else %}
          hx-post="/admin/productos/crear"
          {% endif %}
          hx-target="#tab-content" hx-swap="innerHTML"
          class="space-y-4">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
                <input type="text" name="nombre" required
                       value="{{ producto.nombre if producto else '' }}"
                       class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">SKU</label>
                <input type="text" name="sku"
                       value="{{ producto.sku if producto and producto.sku else '' }}"
                       placeholder="Código interno (opcional)"
                       class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Precio de venta *</label>
                <input type="number" name="precio_base" step="0.01" min="0" required
                       value="{{ producto.precio_base if producto else 0 }}"
                       class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Unidad de medida</label>
                <select name="unidad_medida" class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="unidad" {% if producto and producto.unidad_medida == 'unidad' %}selected{% elif not producto %}selected{% endif %}>Unidad</option>
                    <option value="kg" {% if producto and producto.unidad_medida == 'kg' %}selected{% endif %}>Kilogramo</option>
                    <option value="lt" {% if producto and producto.unidad_medida == 'lt' %}selected{% endif %}>Litro</option>
                    <option value="mt" {% if producto and producto.unidad_medida == 'mt' %}selected{% endif %}>Metro</option>
                    <option value="m2" {% if producto and producto.unidad_medida == 'm2' %}selected{% endif %}>Metro²</option>
                    <option value="bolsa" {% if producto and producto.unidad_medida == 'bolsa' %}selected{% endif %}>Bolsa</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Stock
                    <span class="text-gray-400 text-xs">(vacío = sin control)</span>
                </label>
                <input type="number" name="stock" step="0.01"
                       value="{{ producto.stock if producto and producto.stock is not none else '' }}"
                       placeholder="Dejar vacío si no controlás stock"
                       class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
                <textarea name="descripcion" rows="2"
                          placeholder="Descripción del producto (opcional)"
                          class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">{{ producto.descripcion if producto and producto.descripcion else '' }}</textarea>
            </div>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-medium transition-colors">
                {% if producto %}💾 Guardar Cambios{% else %}➕ Crear Producto{% endif %}
            </button>
            <button type="button" onclick="document.getElementById('producto-form-area').innerHTML = ''"
                    class="bg-gray-300 hover:bg-gray-400 text-gray-700 px-6 py-2 rounded font-medium transition-colors">
                Cancelar
            </button>
        </div>
    </form>
</div>
