{% extends "base.html" %}

{% block title %}Administración{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">⚙️ Administración</h2>

    <!-- Tabs -->
    <div class="border-b border-gray-200 mb-6">
        <nav class="flex space-x-4" id="admin-tabs">
            <button onclick="switchTab('empresa')"
                    class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-blue-500 text-blue-600"
                    data-tab="empresa">
                🏢 Empresa
            </button>
            <button onclick="switchTab('usuarios')"
                    class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700"
                    data-tab="usuarios">
                👥 Usuarios
            </button>
            <button onclick="switchTab('catalogo')"
                    class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700"
                    data-tab="catalogo">
                📦 Catálogo
            </button>
            <button onclick="switchTab('fleteros')"
                    class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700"
                    data-tab="fleteros">
                🚚 Fleteros
            </button>
        </nav>
    </div>

    <!-- Tab content -->
    <div id="tab-content">
        <!-- Default: empresa tab loaded server-side -->
        {% include "admin/partials/tab_empresa.html" %}
    </div>
</div>

<script>
function switchTab(tabName) {
    // Update tab styles
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('border-blue-500', 'text-blue-600');
        btn.classList.add('border-transparent', 'text-gray-500');
    });
    const activeBtn = document.querySelector(`[data-tab="${tabName}"]`);
    if (activeBtn) {
        activeBtn.classList.add('border-blue-500', 'text-blue-600');
        activeBtn.classList.remove('border-transparent', 'text-gray-500');
    }

    // Load tab content via HTMX
    const tabUrls = {
        empresa: '/admin/tab/empresa',
        usuarios: '/admin/tab/usuarios',
        catalogo: '/admin/tab/catalogo',
        fleteros: '/admin/tab/fleteros',
    };
    htmx.ajax('GET', tabUrls[tabName], '#tab-content');
}
</script>
{% endblock %}
