<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pedidos{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        // Cargar configuración de empresa para CSS dinámico
        // Se ejecuta antes de renderizar para evitar FOUC
        (function() {
            fetch('/admin/configuracion/api/config')
                .then(r => r.ok ? r.json() : null)
                .then(config => {
                    if (config && config.color_primario) {
                        const root = document.documentElement;
                        root.style.setProperty('--empresa-color', config.color_primario);
                        // Actualizar navbar
                        const nav = document.querySelector('nav');
                        if (nav) {
                            nav.style.backgroundColor = config.color_primario;
                        }
                    }
                })
                .catch(() => {}); // Silencioso: si falla, usa defaults
        })();

        // Auto-refresh token cada 50 minutos
        // credentials: 'include' is required so the browser sends the refresh_token cookie
        setInterval(() => {
            fetch('/api/refresh-token', { method: 'POST', credentials: 'include' })
                .then(r => { if (!r.ok) window.location.href = '/login'; })
                .catch(() => {});
        }, 50 * 60 * 1000);

        // Indicador de carga HTMX
        document.body.addEventListener('htmx:beforeRequest', () => {
            document.getElementById('loading').classList.remove('hidden');
        });
        document.body.addEventListener('htmx:afterRequest', () => {
            document.getElementById('loading').classList.add('hidden');
        });

        // Redirect to login on 401 — token expired or missing
        document.body.addEventListener('htmx:responseError', (event) => {
            if (event.detail.xhr.status === 401) {
                window.location.href = '/login';
            }
        });

        // CSRF: enviar token en cada request HTMX
        function getCsrfToken() {
            const match = document.cookie.match(/csrf_token=([^;]+)/);
            return match ? decodeURIComponent(match[1]) : '';
        }
        document.body.addEventListener('htmx:configRequest', (event) => {
            const token = getCsrfToken();
            if (token) {
                event.detail.headers['X-CSRF-Token'] = token;
            }
        });
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- CSS Variables para thema dinámico -->
    <style>
        :root {
            --empresa-color: #3b82f6;
            --empresa-color-hover: #2563eb;
        }
    </style>

    <!-- Loading indicator -->
    <div id="loading" class="hidden fixed top-0 left-0 w-full h-1 animate-pulse z-50" style="background-color: var(--empresa-color);"></div>

    <!-- Navigation -->
    <nav class="text-white shadow-lg no-print" style="background-color: var(--empresa-color);">
        <div class="container mx-auto flex items-center gap-3 py-3 px-4">
            <div class="flex gap-4 items-center overflow-x-auto flex-shrink min-w-0 scrollbar-thin">
                <a href="/pedidos" class="text-lg font-bold hover:underline whitespace-nowrap">🏠 Pedidos</a>
                <a href="/nuevo-pedido" class="hover:underline whitespace-nowrap">📝 Nuevo</a>
                <a href="/entregas" class="hover:underline whitespace-nowrap">🚚 Entregas</a>
                <a href="/buscar" class="hover:underline whitespace-nowrap">🔍 Buscar</a>
                <a href="/dashboard" class="hover:underline whitespace-nowrap">📊 Dashboard</a>
                {% if user and user.rol in ('owner', 'admin') %}
                <a href="/admin" class="hover:underline whitespace-nowrap">⚙️ Administración</a>
                {% endif %}
            </div>
            <div class="flex gap-3 items-center flex-shrink-0">
                <span class="text-sm whitespace-nowrap">👋 {{ user.nombre if user else 'Invitado' }}</span>
                <form hx-post="/api/logout" hx-swap="none" class="inline">
                    <button type="submit" class="px-3 py-1 rounded text-sm font-medium hover:opacity-80 transition-opacity whitespace-nowrap" style="background-color: rgba(255,255,255,0.25);">
                        Cerrar Sesión
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Flash messages -->
    <div id="flash-messages" class="container mx-auto mt-4">
        {% block flash %}{% endblock %}
    </div>

    <!-- Main content -->
    <main class="container mx-auto p-4">
        <div id="content">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-gray-400 text-center p-4 mt-8 no-print">
        <p class="text-sm">Pedidos &copy; 2024 — Sistema de Gestión de Pedidos</p>
    </footer>
</body>
</html>
