{% extends "base.html" %}

{% block title %}Nuevo Pedido{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white rounded-lg shadow-lg p-8">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">📝 Nuevo Pedido</h2>

    <form id="pedido-form" hx-post="/guardar-pedido" hx-target="#resultado" hx-swap="innerHTML"
          onsubmit="prepararItems()" class="space-y-6">

        <!-- Cliente: buscar o ingresar manualmente -->
        <fieldset class="border rounded-md p-4">
            <legend class="text-lg font-semibold text-gray-700 px-2">Datos del Cliente</legend>

            <!-- Buscar cliente existente -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Buscar cliente existente</label>
                <div class="relative">
                    <input id="cliente-search" type="text"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Buscar por nombre, apellido o celular..."
                           hx-get="/api/clientes/buscar"
                           hx-vals='{"q": ""}'
                           hx-trigger="keyup changed delay:300ms"
                           hx-target="#clientes-dropdown"
                           hx-swap="innerHTML"
                           oninput="this.setAttribute('hx-vals', JSON.stringify({q: this.value}))">
                    <div id="clientes-dropdown" class="relative"></div>
                </div>
            </div>

            <!-- Campos de cliente (se llenan automáticamente o manualmente) -->
            <input type="hidden" id="cliente_id" name="cliente_id" value="">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="nombre" class="block text-sm font-medium text-gray-700">Nombre</label>
                    <input id="nombre" name="nombre" type="text" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Juan">
                </div>
                <div>
                    <label for="apellido" class="block text-sm font-medium text-gray-700">Apellido</label>
                    <input id="apellido" name="apellido" type="text" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Pérez">
                </div>
                <div>
                    <label for="celular" class="block text-sm font-medium text-gray-700">Celular</label>
                    <input id="celular" name="celular" type="tel" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
                           placeholder="+595991234567">
                </div>
                <div>
                    <label for="direccion" class="block text-sm font-medium text-gray-700">Dirección de Entrega</label>
                    <input id="direccion" name="direccion" type="text" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Calle y número">
                </div>
            </div>
        </fieldset>

        <!-- Líneas de productos -->
        <fieldset class="border rounded-md p-4">
            <legend class="text-lg font-semibold text-gray-700 px-2">Productos del Pedido</legend>

            <!-- Buscar producto -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Buscar producto</label>
                <div class="relative">
                    <input id="producto-search" type="text"
                           class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Buscar por nombre o SKU..."
                           hx-get="/api/productos/buscar"
                           hx-trigger="keyup changed delay:300ms"
                           hx-target="#productos-dropdown"
                           hx-swap="innerHTML"
                           oninput="this.setAttribute('hx-vals', JSON.stringify({q: this.value}))">
                    <div id="productos-dropdown" class="relative"></div>
                </div>
            </div>

            <!-- Tabla de items -->
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="bg-gray-50 text-gray-700">
                            <th class="px-2 py-2 text-left">Producto</th>
                            <th class="px-2 py-2 w-24">Cantidad</th>
                            <th class="px-2 py-2 w-32">Precio Unit.</th>
                            <th class="px-2 py-2 w-32">Subtotal</th>
                            <th class="px-2 py-2 w-10"></th>
                        </tr>
                    </thead>
                    <tbody id="items-body">
                        <!-- Filas dinámicas aquí -->
                    </tbody>
                    <tfoot>
                        <tr class="border-t font-bold text-lg">
                            <td colspan="3" class="px-2 py-3 text-right">Total:</td>
                            <td class="px-2 py-3 text-green-600" id="total-display">$ 0</td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <!-- Hidden input para items JSON -->
            <input type="hidden" id="items_json" name="items_json" value="[]">
        </fieldset>

        <!-- Datos de entrega -->
        <fieldset class="border rounded-md p-4">
            <legend class="text-lg font-semibold text-gray-700 px-2">Datos de Entrega</legend>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="fecha_entrega" class="block text-sm font-medium text-gray-700">Fecha de Entrega</label>
                    <input id="fecha_entrega" name="fecha_entrega" type="date" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="hora_entrega" class="block text-sm font-medium text-gray-700">Hora de Entrega</label>
                    <input id="hora_entrega" name="hora_entrega" type="time" required
                           class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>
        </fieldset>

        <!-- Legacy: pedido_detalle (oculto, se genera automáticamente) -->
        <input type="hidden" id="pedido_detalle" name="pedido_detalle" value="">
        <input type="hidden" id="total" name="total" value="0">

        <div>
            <button type="submit"
                    class="w-full py-3 px-4 bg-green-600 hover:bg-green-700 text-white font-bold rounded-md text-lg">
                💾 Guardar Pedido
            </button>
        </div>
    </form>

    <div id="resultado" class="mt-4"></div>
</div>

<script>
    // --- Items del pedido ---
    let pedidoItems = [];
    let itemCounter = 0;

    function seleccionarCliente(id, nombre, apellido, celular, direccion) {
        document.getElementById('cliente_id').value = id;
        document.getElementById('nombre').value = nombre;
        document.getElementById('apellido').value = apellido;
        document.getElementById('celular').value = celular;
        document.getElementById('direccion').value = direccion;
        document.getElementById('clientes-dropdown').innerHTML = '';
        document.getElementById('cliente-search').value = nombre + ' ' + apellido;
    }

    function agregarProducto(productoId, nombre, precio) {
        // Verificar si ya existe
        const existing = pedidoItems.find(i => i.productoId === productoId);
        if (existing) {
            existing.cantidad += 1;
            existing.subtotal = existing.cantidad * existing.precioUnitario;
        } else {
            pedidoItems.push({
                id: itemCounter++,
                productoId: productoId,
                descripcion: nombre,
                cantidad: 1,
                precioUnitario: precio,
                subtotal: precio,
            });
        }
        renderItems();
        document.getElementById('productos-dropdown').innerHTML = '';
        document.getElementById('producto-search').value = '';
    }

    function agregarLineaManual() {
        pedidoItems.push({
            id: itemCounter++,
            productoId: null,
            descripcion: '',
            cantidad: 1,
            precioUnitario: 0,
            subtotal: 0,
        });
        renderItems();
    }

    function eliminarItem(itemId) {
        pedidoItems = pedidoItems.filter(i => i.id !== itemId);
        renderItems();
    }

    function actualizarItem(itemId, campo, valor) {
        const item = pedidoItems.find(i => i.id === itemId);
        if (item) {
            item[campo] = campo === 'descripcion' ? valor : parseFloat(valor) || 0;
            item.subtotal = item.cantidad * item.precioUnitario;
            renderItems();
        }
    }

    function renderItems() {
        const tbody = document.getElementById('items-body');
        let total = 0;
        let html = '';

        pedidoItems.forEach(item => {
            total += item.subtotal;
            html += `
                <tr class="border-b">
                    <td class="px-2 py-2">
                        <input type="text" value="${item.descripcion}" 
                               onchange="actualizarItem(${item.id}, 'descripcion', this.value)"
                               class="w-full px-2 py-1 border border-gray-300 rounded text-sm"
                               placeholder="Descripción del producto" required>
                    </td>
                    <td class="px-2 py-2">
                        <input type="number" value="${item.cantidad}" step="0.01" min="0.01"
                               onchange="actualizarItem(${item.id}, 'cantidad', this.value)"
                               class="w-full px-2 py-1 border border-gray-300 rounded text-sm text-center">
                    </td>
                    <td class="px-2 py-2">
                        <input type="number" value="${item.precioUnitario}" step="0.01" min="0"
                               onchange="actualizarItem(${item.id}, 'precioUnitario', this.value)"
                               class="w-full px-2 py-1 border border-gray-300 rounded text-sm text-right">
                    </td>
                    <td class="px-2 py-2 text-right font-medium">
                        $ ${item.subtotal.toLocaleString('es-PY', {minimumFractionDigits: 0})}
                    </td>
                    <td class="px-2 py-2 text-center">
                        <button type="button" onclick="eliminarItem(${item.id})"
                                class="text-red-500 hover:text-red-700 text-lg font-bold">&times;</button>
                    </td>
                </tr>`;
        });

        tbody.innerHTML = html || '<tr><td colspan="5" class="text-center text-gray-400 py-4">Agregue productos al pedido</td></tr>';
        document.getElementById('total-display').textContent = '$ ' + total.toLocaleString('es-PY', {minimumFractionDigits: 0});
        document.getElementById('total').value = total;
    }

    function prepararItems() {
        // Generar items_json
        const items = pedidoItems.map(i => ({
            producto_id: i.productoId,
            descripcion: i.descripcion,
            cantidad: i.cantidad,
            precio_unitario: i.precioUnitario,
        }));
        document.getElementById('items_json').value = JSON.stringify(items);

        // Generar pedido_detalle legacy
        const detalle = pedidoItems.map(i => `${i.descripcion} - ${i.cantidad}`).join('\n');
        document.getElementById('pedido_detalle').value = detalle;
    }

    // Botón para agregar línea manual
    document.addEventListener('DOMContentLoaded', () => {
        const addBtn = document.createElement('button');
        addBtn.type = 'button';
        addBtn.className = 'mt-2 text-sm text-blue-600 hover:text-blue-800 underline';
        addBtn.textContent = '+ Agregar línea manual';
        addBtn.onclick = agregarLineaManual;
        document.getElementById('items-body').parentElement.parentElement.parentElement.appendChild(addBtn);
    });
</script>
{% endblock %}
