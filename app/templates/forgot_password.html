{% extends "base.html" %}

{% block title %}Recuperar Contraseña{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">🔑 Recuperar Contraseña</h2>
        <p class="text-gray-600 text-sm mb-6">Ingresá tu email y te enviaremos un link para restablecer tu contraseña.</p>

        <form hx-post="/api/forgot-password" hx-target="#resultado" hx-swap="innerHTML"
              class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input id="email" name="email" type="email" required
                       placeholder="tu@email.com"
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit"
                    class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-md">
                Enviar Link de Recuperación
            </button>
        </form>

        <div id="resultado" class="mt-4"></div>

        <div class="mt-4 text-center">
            <a href="/login" class="text-sm text-blue-600 hover:underline">← Volver al login</a>
        </div>
    </div>
</div>
{% endblock %}
